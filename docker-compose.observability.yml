services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: observability-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "9464:9464"
    depends_on:
      - tempo
      - loki
    networks:
      - observability-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: observability-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: observability-loki
    user: "0:0"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/config.yaml
      - loki-data:/var/lib/loki
    ports:
      - "3100:3100"
    networks:
      - observability-net
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.0
    container_name: observability-tempo
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo/config.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - observability-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: observability-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/opt/grafana/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability-net
    restart: unless-stopped

networks:
  observability-net:
    external: true

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
